        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ═════════════════ BACKGROUND ANIMATION ═════════════════ */
        .bg-pattern {

            to { transform: translateY(-20vh) rotate(360deg); }
        }

        /* ═════════════════ SCREEN LAYOUTS ═════════════════ */
        .screen {
            display: none;

        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ═════════════════ UI COMPONENTS ═════════════════ */

            padding: 25px;

        .score-bar {
            position: fixed;
            top: 0; left: 0; width: 100%;

</div>

<script>
// ═════════════════ DATA LOAD ═════════════════
const DATABASE = [
    { q: "I hope the evil witch of north america puts a curse on your bloodline.", a: "Leon", o: ["Charlie", "Josephy", "Lloyd"] },
    { q: "One time I shoved a pencil up my ass and then clenched and it shot out and made a hole in my wall.", a: "Josephy", o: ["Leon", "Matilda", "Emma"] },
    { q: "O Leon! Thou perfidious, serpent-tongued wretch, what manner of treachery hath taken root within that hollow chest of thine...", a: "Charlie", o: ["Mohammed", "Autumn", "Lloyd"] },
    { q: "EVERY TIME I HICCUP I BURP IT WONT STOO", a: "Ruby", o: ["Emma", "Matilda", "Evie"] },
    { q: "I teleported 4 hours into the future. This keeps happening.", a: "Leon", o: ["Mohammed", "Elias", "Josephy"] },
    { q: "Wrestling is a sex fest. it was made for gay men to blend in into straight men culture.", a: "Mohammed", o: ["Leon", "Charlie", "Lloyd"] },
    { q: "I did NOT suck on Ruby's tits*", a: "Charlie", o: ["Leon", "Josephy", "Emile"] },
    { q: "MY WIFE JUST RAN OUT AND THEN GOT ATTACKED BY A GINGER. AT LEAST SHE'S IRISH.", a: "Emma", o: ["Ruby", "Matilda", "Autumn"] },
    { q: "Am I the only one who lowkey wants a school shooting to happen... Gulp.", a: "Autumn", o: ["Elias", "Ruby", "Kian"] },
    { q: "I lost streak. Gg. (After 18 minutes of no-gooning)", a: "Josephy", o: ["Leon", "Charlie", "Lloyd"] },
    { q: "I just found out a test they had me do at the hospital is to look for a brain tumour.", a: "Emma", o: ["Ruby", "Matilda", "Leon"] },
    { q: "Bro said cutting myself is too basic let's set me on fire.", a: "Lloyd", o: ["Emile", "Josephy", "Leon"] },
    { q: "Icl ts pmo sm n sb rn ngl.", a: "Elias", o: ["Mohammed", "Autumn", "Kian"] },
    { q: "MATILDA A HOE", a: "Leon", o: ["Charlie", "Josephy", "Lloyd"] },
    { q: "I hope you sneeze out a metal rod and it destroys your organs in the process.", a: "Leon", o: ["Emma", "Charlie", "Ruby"] },
    { q: "Leon put me in the group and not kian he knows who the alpha is.", a: "Josephy", o: ["Charlie", "Mohammed", "Elias"] },
    { q: "I tried to eat soap but it tasted like nothing.", a: "Ruby", o: ["Matilda", "Emma", "Leon"] },
    { q: "The thing is my house is so cold that I turn on the oven and sit in front of it.", a: "Charlie", o: ["Leon", "Ruby", "Emma"] }
];

// ═════════════════ GAME STATE ═════════════════
let currentQ = 0;
let score = 0;
let correctCount = 0;
let gamePool = [];
let targetQCount = 15;

function setQCount(count) {
    targetQCount = count;
    [5, 10, 15].forEach(num => {
        document.getElementById(`btn-${num}`).style.border = (num === count) ? '3px solid white' : 'none';
    });
}

// Generate background orbs
const bg = document.getElementById('bg-canvas');
for(let i=0; i<15; i++){
    const orb = document.createElement('div');
    orb.className = 'floating-orb';
    let size = Math.random() * 100 + 50;
    orb.style.width = size + 'px';
    orb.style.height = size + 'px';
    orb.style.left = Math.random() * 100 + 'vw';
    orb.style.animationDuration = (Math.random() * 10 + 10) + 's';
    orb.style.animationDelay = (Math.random() * 5) + 's';
    bg.appendChild(orb);
}

function startGame() {
    gamePool = [...DATABASE].sort(() => Math.random() - 0.5).slice(0, targetQCount);
    currentQ = 0;
    score = 0;
    correctCount = 0;
    
    document.getElementById('screen-start').classList.remove('active');
    document.getElementById('screen-game').classList.add('active');
    document.getElementById('score-bar').style.display = 'flex';
    
    showQuestion();
}

function showQuestion() {
    const data = gamePool[currentQ];
    document.getElementById('active-question').innerText = data.q;
    document.getElementById('q-count').innerText = `Question: ${currentQ + 1}/${gamePool.length}`;
    document.getElementById('current-score').innerText = `Score: ${score}`;

    const options = [data.a, ...data.o].sort(() => Math.random() - 0.5);
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, data.a);
        grid.appendChild(btn);
    });
}

function checkAnswer(chosen, correct) {
    const isCorrect = chosen === correct;
    const fbId = isCorrect ? 'feedback-correct' : 'feedback-wrong';
    const fb = document.getElementById(fbId);
    
    if(!isCorrect) {
        document.getElementById('correct-reveal').innerText = `Actually, it was ${correct}`;
    }

    if(isCorrect) {
        score += 1000;
        correctCount++;
    }
    
    fb.style.display = 'flex';
    
    setTimeout(() => {
        fb.style.display = 'none';
        nextQuestion();
    }, 1500);
}

function nextQuestion() {
    currentQ++;
    if(currentQ < gamePool.length) {
        showQuestion();
    } else {
        endGame();
    }
}

function endGame() {
    document.getElementById('score-bar').style.display = 'none';
    document.getElementById('screen-game').classList.remove('active');
    document.getElementById('screen-end').classList.add('active');
    
    document.getElementById('final-score').innerText = score.toLocaleString();
    document.getElementById('final-correct').innerText = `${correctCount}/${gamePool.length}`;
}
</script>
</body>
